name: Build and Deploy App

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Login to Azure
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          auth-type: SERVICE_PRINCIPAL
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push image to ACR
        env:
          ACR_NAME: ${{ secrets.ACR_NAME }}
        run: |
          TOKEN=$(az acr login --name "$ACR_NAME" --expose-token --output tsv --query accessToken)
          echo $TOKEN | docker login -u 00000000-0000-0000-0000-000000000000 --password-stdin "$ACR_NAME.azurecr.io"
          IMAGE="$ACR_NAME.azurecr.io/simple-webapp:latest"
          docker build -t "$IMAGE" app
          docker push "$IMAGE"
      - name: Get AKS credentials
        env:
          AKS_RESOURCE_GROUP: ${{ secrets.AKS_RESOURCE_GROUP }}
          AKS_CLUSTER_NAME: ${{ secrets.AKS_CLUSTER_NAME }}
        run: |
          az aks get-credentials --resource-group "$AKS_RESOURCE_GROUP" --name "$AKS_CLUSTER_NAME"
      - name: Render deployment manifest
        env:
          IMAGE: ${{ secrets.ACR_NAME }}.azurecr.io/simple-webapp:latest
        run: |
          python -c "import pathlib, os; raw = pathlib.Path('kubernetes/deployment.yaml').read_text(); output = raw.replace('REPLACE_WITH_ACR/simple-webapp:latest', os.environ['IMAGE']); pathlib.Path('kubernetes/rendered-deployment.yaml').write_text(output)"
      - name: Deploy web app to AKS
        run: |
          kubectl apply -f kubernetes/namespace.yaml
          kubectl apply -f kubernetes/rendered-deployment.yaml
          kubectl apply -f kubernetes/service.yaml
