apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-webapp
  namespace: demo
  labels:
    app: simple-webapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simple-webapp
  template:
    metadata:
      labels:
        app: simple-webapp
    spec:
      containers:
        - name: webapp
          image: acregaksdemodev.azurecr.io/simple-webapp:latest
          ports:
            - containerPort: 80
